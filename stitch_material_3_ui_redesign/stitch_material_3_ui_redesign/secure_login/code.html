<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="flex-grow flex items-center justify-center p-gutter md:p-margin-desktop">
<div class="w-full max-w-md bg-surface-container-lowest rounded-[24px] shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-outline-variant/30 overflow-hidden">
<div class="px-lg pt-xl pb-md text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container/10 text-primary-container mb-md">
<span class="material-symbols-outlined text-4xl" data-icon="health_and_safety" data-weight="fill" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Maya CBHI</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Secure Citizen Portal</p>
</div>
<div class="px-lg pb-xl">
<form class="space-y-md">
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="identifier">Email or Phone Number</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-DEFAULT transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline/70" id="identifier" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-DEFAULT transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline/70" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full flex items-center justify-center py-3 px-4 bg-primary text-on-primary rounded-full font-label-lg text-label-lg hover:bg-primary-container transition-colors shadow-sm mt-lg" type="button">
                        Sign In
                    </button>
</form>
<div class="flex items-center my-lg">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="flex-shrink-0 px-4 font-label-md text-label-md text-outline">OR</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<button class="w-full flex items-center justify-center gap-sm py-3 px-4 bg-surface-container border border-outline-variant/50 text-on-surface rounded-full font-label-lg text-label-lg hover:bg-surface-container-high transition-colors" type="button">
<span class="material-symbols-outlined text-[20px] text-primary" data-icon="fingerprint">fingerprint</span>
                    Login with Biometrics
                </button>
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        New to Maya CBHI? 
                        <a class="font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors ml-xs" href="#">Create Account</a>
</p>
</div>
</div>
</div>
</main>
<footer class="py-md px-gutter text-center border-t border-outline-variant/20 bg-surface">
<div class="flex flex-wrap justify-center gap-x-md gap-y-sm">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Help</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms</a>
</div>
