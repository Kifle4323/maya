<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- TopAppBar (From Shared Components) -->
<header class="bg-white dark:bg-slate-900 sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center w-full px-4 h-16 shadow-sm">
<button aria-label="Go back" class="text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors p-2 flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-manrope font-extrabold text-blue-700 dark:text-blue-400 text-lg tracking-tight">Member Registration</h1>
<button aria-label="Help" class="text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors p-2 flex items-center justify-center">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-grow w-full max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-lg flex flex-col gap-xl">
<!-- Progress Header -->
<section class="flex flex-col gap-sm">
<div class="flex justify-between items-end mb-xs">
<span class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Step 4 of 4</span>
<span class="font-title-md text-title-md text-primary">100%</span>
</div>
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary w-full rounded-full transition-all duration-500 ease-out"></div>
</div>
<div class="mt-md">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Verify Eligibility</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-2xl">
                    To complete your subsidized membership registration, please select how you would like to provide your household assessment or income proof.
                </p>
</div>
</section>
<!-- Verification Options (M3 Tonal Cards) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Option 1: Verify Now (Styled as Selected for demonstration) -->
<label class="relative flex flex-col gap-md p-lg rounded-xl bg-primary-fixed border-2 border-primary cursor-pointer transition-all hover:shadow-md">
<div class="flex justify-between items-start w-full">
<div class="p-2 bg-primary rounded-lg text-on-primary flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">upload_file</span>
</div>
<div class="flex items-center justify-center h-6 w-6 rounded-full border-2 border-primary bg-primary text-on-primary">
<div class="w-2 h-2 rounded-full bg-on-primary"></div>
</div>
</div>
<div class="flex flex-col gap-xs flex-grow">
<h3 class="font-title-lg text-title-lg text-on-primary-fixed">Verify Now</h3>
<p class="font-body-md text-body-md text-on-primary-fixed-variant">
                        Upload your official household assessment or proof of income immediately using your device.
                    </p>
</div>
<div class="mt-auto pt-sm border-t border-primary/20">
<span class="inline-flex items-center gap-xs text-primary font-label-md text-label-md">
<span class="material-symbols-outlined text-[16px]">bolt</span>
                        Fastest way to active coverage
                    </span>
</div>
<!-- Hidden input for form submission -->
<input checked="" class="hidden" name="verification_method" type="radio" value="now"/>
</label>
<!-- Option 2: Verify Later (Unselected) -->
<label class="relative flex flex-col gap-md p-lg rounded-xl bg-surface-container-low border border-outline-variant cursor-pointer transition-all hover:bg-surface-container hover:border-outline">
<div class="flex justify-between items-start w-full">
<div class="p-2 bg-surface-variant rounded-lg text-on-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined">schedule</span>
</div>
<div class="flex items-center justify-center h-6 w-6 rounded-full border-2 border-outline"></div>
</div>
<div class="flex flex-col gap-xs flex-grow">
<h3 class="font-title-lg text-title-lg text-on-surface">Verify Later</h3>
<p class="font-body-md text-body-md text-on-surface-variant">
                        Complete your application now and submit your documents within 30 days at a local office or online.
                    </p>
</div>
<div class="mt-auto pt-sm flex items-center">
<div class="inline-flex items-center gap-xs px-3 py-1.5 rounded-full bg-secondary-container text-on-secondary-container font-label-md text-label-md">
<span class="material-symbols-outlined text-[14px]">info</span>
                        Coverage pending verification
                    </div>
</div>
<!-- Hidden input for form submission -->
<input class="hidden" name="verification_method" type="radio" value="later"/>
</label>
</section>
<!-- Action Area -->
<section class="mt-auto pt-lg border-t border-surface-variant flex flex-col sm:flex-row justify-end items-center gap-md">
<button class="w-full sm:w-auto px-6 py-3 rounded-full border border-outline text-on-surface font-label-lg text-label-lg hover:bg-surface-variant transition-colors flex items-center justify-center gap-2" type="button">
                Cancel
            </button>
<button class="w-full sm:w-auto px-8 py-3 rounded-full bg-primary text-on-primary font-label-lg text-label-lg hover:bg-surface-tint transition-colors shadow-sm flex items-center justify-center gap-2" type="button">
                Confirm Selection
                <span class="material-symbols-outlined text-[18px]">check_circle</span>
</button>
</section>
