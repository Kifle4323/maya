            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- Content Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="max-w-lg w-full bg-surface-container-low rounded-xl shadow-sm border border-surface-container p-xl flex flex-col items-center text-center">
<!-- Success Icon -->
<div class="mb-lg w-20 h-20 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined fill text-on-tertiary-fixed" style="font-size: 48px;">
                    check_circle
                </span>
</div>
<!-- Title -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">
                Registration Received
            </h1>
<!-- Primary Message -->
<p class="font-title-md text-title-md text-on-surface-variant mb-md">
                Your registration has been submitted successfully!
            </p>
<!-- Status Chip -->
<div class="mb-md inline-flex items-center gap-2 bg-surface-variant px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">
                    schedule
                </span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase">
                    Status: Pending
                </span>
</div>
<!-- Subtext -->
<p class="font-body-md text-body-md text-on-surface-variant mb-xl max-w-sm">
                Since you chose to pay/verify later, your account status is currently PENDING. Please complete the remaining steps to activate your full benefits.
            </p>
<!-- Action Button -->
<button class="w-full md:w-auto px-lg py-3 bg-primary text-on-primary rounded-full font-label-lg text-label-lg hover:bg-on-primary-fixed-variant transition-colors flex items-center justify-center gap-2">
                Go to Dashboard
                <span class="material-symbols-outlined text-[18px]">
                    arrow_forward
                </span>
</button>
</div>
